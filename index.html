<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WeatherNow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

    <div class="search-bar">
        <input type="text" placeholder="Enter city name...">
        <button>Search</button>
    </div>

    <div class="current-weather">
        <h2 class="skeleton">City Name</h2>
        <p class="skeleton">Temperature</p>
        <p class="skeleton">Weather Description</p>
        <p class="skeleton">Humidity</p>
        <p class="skeleton">Wind Speed</p>
        <p class="skeleton">Local Time</p>
    </div>

    <div class="forecast">
        <div class="forecast-card">
            <p class="skeleton text-line">Monday</p>
            <p class="skeleton icon-box">🌦️</p>
            <p class="skeleton text-line">33°/25°</p>
        </div>

        <div class="forecast-card">
            <p class="skeleton text-line">Tuesday</p>
            <p class="skeleton icon-box">🌦️</p>
            <p class="skeleton text-line">34°/25°</p>
        </div>

        <div class="forecast-card">
            <p class="skeleton text-line">Wednesday</p>
            <p class="skeleton icon-box">☁️</p>
            <p class="skeleton text-line">33°/25°</p>
        </div>

        <div class="forecast-card">
            <p class="skeleton text-line">Thursday</p>
            <p class="skeleton icon-box">🌧️</p>
            <p class="skeleton text-line">32°/26°</p>
        </div>

        <div class="forecast-card">
            <p class="skeleton text-line">Friday</p>
            <p class="skeleton icon-box">🌤️</p>
            <p class="skeleton text-line">31°/25°</p>
        </div>

        <div class="forecast-card">
            <p class="skeleton text-line">Saturday</p>
            <p class="skeleton icon-box">🌦️</p>
            <p class="skeleton text-line">32°/25°</p>
        </div>

        <div class="forecast-card">
            <p class="skeleton text-line">Sunday</p>
            <p class="skeleton icon-box">🌧️</p>
            <p class="skeleton text-line">31° /25°</p>
        </div>
    </div>

</div>

</body>
</html>
